<div id="resume-zone" class="ob-dropzone">
  <form hx-post="/onboarding/resume"
        hx-encoding="multipart/form-data"
        hx-target="#resume-zone"
        hx-swap="outerHTML"
        class="flex flex-col items-center gap-3 p-6">
    <svg viewBox="0 0 24 24" class="w-10 h-10 text-muted" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/>
      <path d="M14 2v6h6M12 12v6M9 15l3-3 3 3"/>
    </svg>
    <p class="text-sm text-muted text-center">Upload your resume to begin<br><span class="text-xs">.docx or .pdf</span></p>
    <label class="btn cursor-pointer">
      Choose file
      <input type="file" name="file" accept=".docx,.pdf" required class="sr-only"
             onchange="this.closest('form').submit()">
    </label>
  </form>
</div>
