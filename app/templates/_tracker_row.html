<tr id="trow-{{ r.row_key|domid }}">
  <td><a href="/company/{{ r.company|normco|urlk }}">{{ r.company }}</a></td>
  <td><a href="/jobs/{{ r.row_key|urlk }}">{{ r.role_title }}</a></td>
  <td><span class="fitpill {{ r.score_tone }}">{{ r.match_score }}</span></td>
  <td>
    <span class="tstat tstat--{{ r.status }}">
      <select name="value" class="filter-select" style="width:auto;padding:5px 8px;background:transparent;border-color:transparent"
              hx-post="/tracker/{{ r.row_key|urlk }}/status"
              hx-target="#trow-{{ r.row_key|domid }}"
              hx-swap="outerHTML"
              hx-trigger="change">
        {% for st in status_flow %}
        <option value="{{ st }}" {{ 'selected' if r.status == st }}>{{ st.replace('_',' ')|title }}</option>
        {% endfor %}
      </select>
    </span>
  </td>
  <td>{{ r.applied_at or '-' }}</td>
  <td>
    {% if r.contacts %}
    <a href="/company/{{ r.company|normco|urlk }}" class="badge ok">{{ r.contacts }}</a>
    {% else %}
    <span class="badge muted">0</span>
    {% endif %}
  </td>
  <td>{{ (r.notes[:60] ~ '…') if r.notes|length > 60 else r.notes }}</td>
</tr>
