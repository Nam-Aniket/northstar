<!doctype html>
<html lang="en" data-theme="warm">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Northstar{% endblock %}</title>
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('ns-theme')||'warm'}catch(e){}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: {
        cream:'rgb(var(--c-bg)/<alpha-value>)', sand:'rgb(var(--c-sand)/<alpha-value>)',
        paper:'rgb(var(--c-paper)/<alpha-value>)', line:'rgb(var(--c-line)/<alpha-value>)',
        ink:'rgb(var(--c-ink)/<alpha-value>)', ink2:'rgb(var(--c-ink2)/<alpha-value>)', muted:'rgb(var(--c-muted)/<alpha-value>)',
        clay:'rgb(var(--c-accent)/<alpha-value>)', clayd:'rgb(var(--c-accent-d)/<alpha-value>)', claysoft:'rgb(var(--c-accent-soft)/<alpha-value>)',
        leaf:'rgb(var(--c-good)/<alpha-value>)', leafsoft:'rgb(var(--c-good-soft)/<alpha-value>)',
        gold:'rgb(var(--c-warn)/<alpha-value>)', goldsoft:'rgb(var(--c-warn-soft)/<alpha-value>)',
      },
      fontFamily: { sans:['Urbanist','Helvetica Neue','Arial','sans-serif'], display:['Chakra Petch','Urbanist','Helvetica Neue','Arial','sans-serif'] },
    }}}
  </script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-cream text-ink font-sans antialiased min-h-screen">
  {% set path = request.url.path %}
  <header class="ns-topbar sticky top-0 z-30">
    <div class="max-w-6xl mx-auto px-5 h-16 flex items-center gap-5">
      <a href="/" class="flex items-center gap-2.5 shrink-0">
        <span class="brandmark"><svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polygon points="15.5 8.5 11 11 8.5 15.5 13 13" fill="currentColor" stroke="none"/></svg></span>
        <span class="font-display text-xl tracking-tight hidden sm:block">Northstar</span>
      </a>
      <nav class="ns-nav">
        <a href="/" class="navlink {{ 'active' if path == '/' }}">Board</a>
        <a href="/insights" class="navlink {{ 'active' if path == '/insights' }}">Insights</a>
        <a href="/tracker" class="navlink {{ 'active' if path == '/tracker' or path.startswith('/company') }}">Tracker</a>
        <a href="/business" class="navlink {{ 'active' if path.startswith('/business') }}">Business</a>
        <a href="/builder" class="navlink {{ 'active' if path == '/builder' }}">Builder</a>
        <a href="/onboarding" class="navlink {{ 'active' if path == '/onboarding' }}">Setup</a>
      </nav>
      <div class="ml-auto flex items-center gap-1.5 shrink-0">
        <button id="themeBtn" class="icon-btn" title="Switch light / dark" aria-label="Switch theme">
          <svg class="th-warm w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="th-dark w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
        </button>
        <a href="/run/log" target="_blank" rel="noopener" class="icon-btn" title="View last run log" aria-label="View last run log">
          <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
        </a>
        <button hx-post="/sync" hx-indicator="#sync-spin" hx-disabled-elt="this" class="sync-btn" title="Reload the latest pipeline data" aria-label="Sync data">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
          <span class="hidden md:inline">Sync</span>
          <span id="sync-spin" class="htmx-indicator spinner" aria-hidden="true"></span>
        </button>
        <button hx-post="/run" hx-target="#run-progress" hx-swap="outerHTML" hx-disabled-elt="this" class="sync-btn sync-btn--primary" title="Run the full pipeline (prepare → score → generate → sync)" aria-label="Run pipeline">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/></svg>
          <span class="hidden md:inline">Run</span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-5 py-7">
    <div id="run-progress" hx-get="/run/status" hx-trigger="load" hx-swap="outerHTML"></div>
    {% block content %}{% endblock %}
  </main>

  <div id="toast" class="ns-toast-wrap"></div>

  <div class="ns-cursor-dot" aria-hidden="true"></div>

  <script>
    var root = document.documentElement, tb = document.getElementById('themeBtn');
    if (tb) tb.addEventListener('click', function () {
      var t = root.dataset.theme === 'dark' ? 'warm' : 'dark';
      root.dataset.theme = t; try { localStorage.setItem('ns-theme', t); } catch (e) {}
    });
    document.body.addEventListener('toast', function (e) {
      var w = document.getElementById('toast'), n = document.createElement('div');
      n.className = 'toast-chip'; n.textContent = (e.detail && e.detail.value) || 'Done';
      w.appendChild(n);
      setTimeout(function () { n.classList.add('toast-out'); }, 1700);
      setTimeout(function () { n.remove(); }, 2100);
    });

    /* Copy-all-emails: gathers data-email from the nearest [data-company-scope]
       (or the whole page when none), de-dupes, and writes them comma-separated to
       the clipboard. Shared by the job tracker and Business mode. Delegated so it
       survives HTMX swaps. */
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-copy-emails]');
      if (!btn) return;
      var scope = btn.closest('[data-company-scope]') || document;
      var emails = Array.prototype.map.call(
          scope.querySelectorAll('[data-email]'),
          function (el) { return (el.getAttribute('data-email') || '').trim(); })
        .filter(Boolean);
      emails = Array.from(new Set(emails));
      if (!emails.length) return;
      navigator.clipboard.writeText(emails.join(', ')).then(function () {
        var orig = btn.getAttribute('data-label') || btn.textContent.trim();
        btn.setAttribute('data-label', orig);
        btn.textContent = 'Copied ' + emails.length;
        setTimeout(function () { btn.textContent = orig; }, 1500);
      });
    });

    /* ── Ramos motion layer ─────────────────────────────────────────────────── */
    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var finePointer = window.matchMedia && window.matchMedia('(pointer:fine)').matches;

    /* Lenis smooth scroll (skip when reduced-motion) */
    if (!reduceMotion && window.Lenis) {
      try {
        var lenis = new Lenis({ duration: 1.1, easing: function (t) { return 1 - Math.pow(1 - t, 3); }, smoothWheel: true });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
      } catch (e) {}
    }

    /* Custom cursor - single coral dot that stretches toward its motion.
       The RAF loop runs ONLY while the pointer is moving (idle = no CPU). */
    if (finePointer && !reduceMotion) {
      var dot = document.querySelector('.ns-cursor-dot');
      if (dot) {
        document.body.style.cursor = 'none';
        var tx = window.innerWidth / 2, ty = window.innerHeight / 2;
        var cx = tx, cy = ty, raf = null, hovering = false;
        document.addEventListener('mousemove', function (e) {
          tx = e.clientX; ty = e.clientY;
          if (!raf) raf = requestAnimationFrame(loop);
        }, { passive: true });
        function loop() {
          var dx = tx - cx, dy = ty - cy;
          cx += dx * 0.35; cy += dy * 0.35;
          var speed = Math.min(Math.sqrt(dx * dx + dy * dy), 60) / 60;
          if (hovering || speed < 0.02) {
            dot.style.transform = 'translate(' + cx + 'px,' + cy + 'px)';
          } else {
            var ang = Math.atan2(dy, dx) * 180 / Math.PI;
            dot.style.transform = 'translate(' + cx + 'px,' + cy + 'px) rotate(' + ang + 'deg) scale(' + (1 + speed * 0.7) + ',' + (1 - speed * 0.45) + ')';
          }
          if (Math.abs(dx) > 0.2 || Math.abs(dy) > 0.2) { raf = requestAnimationFrame(loop); }
          else { dot.style.transform = 'translate(' + cx + 'px,' + cy + 'px)'; raf = null; }
        }
        var hoverSel = 'a,button,[role=button],.statlink,.panel,input,select,textarea,summary';
        document.addEventListener('mouseover', function (e) {
          if (e.target.closest && e.target.closest(hoverSel)) { hovering = true; dot.classList.add('is-hover'); }
        });
        document.addEventListener('mouseout', function (e) {
          if (e.target.closest && e.target.closest(hoverSel) &&
              !(e.relatedTarget && e.relatedTarget.closest && e.relatedTarget.closest(hoverSel))) {
            hovering = false; dot.classList.remove('is-hover');
          }
        });
      }
    }

    /* Reveal-on-scroll - only arm (and hide) when motion is allowed + IO exists */
    if (!reduceMotion && 'IntersectionObserver' in window) {
      root.classList.add('js-reveal');
      var revObs = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) {
          if (en.isIntersecting) { en.target.classList.add('in'); revObs.unobserve(en.target); }
        });
      }, { rootMargin: '0px 0px -8% 0px', threshold: 0.05 });
      function scanReveal(r) {
        (r || document).querySelectorAll('.reveal:not(.in)').forEach(function (el) { revObs.observe(el); });
      }
      scanReveal(document);
      document.body.addEventListener('htmx:afterSwap', function (e) { scanReveal(e.target); });
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
