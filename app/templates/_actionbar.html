<div id="actionbar" class="flex flex-wrap items-center gap-2">
  {% if j.job_url %}
  <a href="{{ j.job_url }}" target="_blank" rel="noopener" class="btn-open text-sm" style="padding:9px 15px">
    Open job<svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>
  </a>
  {% endif %}

  {% if j.applied %}
    <span class="applied-pill" style="padding:9px 13px"><svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Applied</span>
    <button hx-post="/jobs/{{ j.row_key|urlk }}/unapply" hx-vals='{"view":"detail"}' hx-target="#actionbar" hx-swap="outerHTML" class="btn-undo" style="padding:9px 13px">Undo</button>
  {% else %}
    <button hx-post="/jobs/{{ j.row_key|urlk }}/apply" hx-vals='{"view":"detail"}' hx-target="#actionbar" hx-swap="outerHTML"
            hx-on::after-request="htmx.trigger(document.body,'toast',{value:'Marked applied'})" class="btn-apply text-sm" style="padding:9px 15px">
      <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Mark applied
    </button>
  {% endif %}

  <button hx-post="/jobs/{{ j.row_key|urlk }}/star" hx-vals='{"view":"detail"}' hx-target="#actionbar" hx-swap="outerHTML"
          class="btn-open {{ 'on text-clay' if j.starred }}" style="padding:9px 13px">
    <svg viewBox="0 0 24 24" class="w-4 h-4" fill="{{ 'currentColor' if j.starred else 'none' }}" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 17l-5.2 2.6 1-5.8-4.3-4.1 5.9-.9z"/></svg>{{ 'Starred' if j.starred else 'Star' }}
  </button>

  {% if j.dismissed %}
    <button hx-post="/jobs/{{ j.row_key|urlk }}/restore" hx-vals='{"view":"detail"}' hx-target="#actionbar" hx-swap="outerHTML" class="btn-undo" style="padding:9px 13px">Restore</button>
  {% else %}
    <button hx-post="/jobs/{{ j.row_key|urlk }}/dismiss" hx-vals='{"view":"detail"}' hx-target="#actionbar" hx-swap="outerHTML" class="btn-undo" style="padding:9px 13px">Dismiss</button>
  {% endif %}

  <label class="ml-auto flex items-center gap-2 text-sm text-ink2">Stage
    <select name="value" hx-post="/jobs/{{ j.row_key|urlk }}/status" hx-target="#actionbar" hx-swap="outerHTML" hx-trigger="change" class="filter-select" style="width:auto;padding:7px 10px">
      {% for st in status_flow %}<option value="{{ st }}" {{ 'selected' if j.status==st }}>{{ st.replace('_',' ')|title }}</option>{% endfor %}
    </select>
  </label>
</div>
