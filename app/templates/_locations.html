<div id="locations-list">
  <div class="flex flex-col gap-2 mb-3">
    <div class="flex flex-col gap-1.5">
      <label class="filter-label">Country</label>
      <select name="country"
              class="filter-select"
              hx-get="/onboarding/location/states"
              hx-trigger="change"
              hx-target="#loc-state-wrap"
              hx-include="this">
        <option value="">Select country</option>
        {% for c in countries %}
        <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
      </select>
    </div>
    <div id="loc-state-wrap"></div>
    <div id="loc-city-wrap"></div>
    <div>
      <button hx-post="/onboarding/location"
              hx-include="[name=country],[name=state],[name=city]"
              hx-target="#locations-list"
              hx-swap="outerHTML"
              class="btn text-xs px-4">Add</button>
    </div>
  </div>
  {% if locations %}
  <div class="flex flex-col gap-1.5">
    {% for l in locations %}
      {% include "_location_card.html" %}
    {% endfor %}
  </div>
  {% else %}
  <p class="text-xs text-muted">No locations added yet.</p>
  {% endif %}
</div>
